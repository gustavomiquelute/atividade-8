<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1> Calculadora </h1>
    </header>

    
    <div class="container">
        <input type="text" id="num1" placeholder="Digite o primeiro numero">
        <input type="text" id="num2" placeholder="Digite o segundo numero">

        <div class="buttons">
            <button id="soma">soma</button>
            <button id="subtracao">subtração</button>
            <button id="multiplicacao">multiplição</button>
            <button id="divisao">divisão</button>
            <button id="limpar">Limpar</button>
        </div>

         <p id="resultado">Resultado: </p>

    </div>

    
    
    <script src="script.js"></script>

</body>
</html>
